      alias: "claude-opus-4-5-20251101"
    - name: "gpt-5.4"
      alias: "claude-opus-4-1-20250805"
      fork: true
    - name: "gpt-5.4"
      alias: "claude-opus-4-20250514"
      fork: true
# SONNET → gpt-5.4-mini (can bang toc do / chat luong)
    - name: "gpt-5.4-mini"
      alias: "claude-sonnet-4-5-20250929" # PRIMARY sonnet
      fork: true
    - name: "gpt-5.4-mini"
      alias: "claude-sonnet-4-6" # shortname dung boi Claude Code v2.1.85+
      fork: true
    - name: "gpt-5.4-mini"
      alias: "claude-sonnet-4-5" # shortname khong year suffix
      fork: true
    - name: "gpt-5.4-mini"
      alias: "claude-sonnet-4-20250514"
