# ── Payload Filter: Strip unsupported JSON Schema fields ───────────────────
# Antigravity/Gemini API KHONG ho tro cac JSON Schema keyword sau day.
# Claude Code CLI tu dong them cac field nay vao tool definitions → 400 error.
# Filter nay ap dung cho Antigravity format payload (sau khi proxy convert).
#
# Path format: Gemini/Antigravity JSON format
#   tools[].function_declarations[].parameters.properties.{KEY}.propertyNames
#
# Keywords bi tu choi boi Gemini API:
#   - propertyNames     (JSON Schema Draft-7)
#   - additionalProperties (Gemini chi support subset of JSON Schema)
#   - patternProperties
#   - $schema, $id, $ref, $defs, anyOf, oneOf, allOf
#
# Wildcard syntax:
#   #  = iterate over array elements
#   *  = any object key
payload:
  filter:
    - models:
        - name: "*"
          protocol: "antigravity"
      params:
        # ── propertyNames ─────────────────────────────────────────────────
        # Depth 0: parameters.propertyNames
        - "tools.#.function_declarations.#.parameters.propertyNames"
        # Depth 1: parameters.properties.{KEY}.propertyNames
        - "tools.#.function_declarations.#.parameters.properties.*.propertyNames"
        # Depth 2a: ...properties.{KEY}.items.properties.{KEY}.propertyNames
        - "tools.#.function_declarations.#.parameters.properties.*.items.properties.*.propertyNames"
        # Depth 2b: ...properties.{KEY}.properties.{KEY}.propertyNames
        - "tools.#.function_declarations.#.parameters.properties.*.properties.*.propertyNames"
        # ── additionalProperties ──────────────────────────────────────────
        - "tools.#.function_declarations.#.parameters.additionalProperties"
        - "tools.#.function_declarations.#.parameters.properties.*.additionalProperties"
        - "tools.#.function_declarations.#.parameters.properties.*.items.additionalProperties"
        - "tools.#.function_declarations.#.parameters.properties.*.items.properties.*.additionalProperties"
        # ── patternProperties ─────────────────────────────────────────────
        - "tools.#.function_declarations.#.parameters.properties.*.patternProperties"
        - "tools.#.function_declarations.#.parameters.properties.*.items.properties.*.patternProperties"
