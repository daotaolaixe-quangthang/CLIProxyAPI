# ============================================================
# CLIProxyAPI Configuration - Ashley Nguyen
# Updated: 2026-04-24 - OPTIMIZED: fix TCP abort on long Opus+thinking requests
# Provider: OpenAI Codex OAuth (3 accounts)
# Real Codex models: gpt-5.4 / gpt-5.4-mini / gpt-5.3-codex
# ============================================================

host: "127.0.0.1"
port: 8318
# ── Management Web UI ──────────────────────────────────────
remote-management:
  allow-remote: false
  secret-key: "$2a$10$jAVcxKj44VXIKusPRF1dPu0WbRKTc/zY4VwWRlrqBqjWmdBTVNA7y"
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"
# ── Auth ────────────────────────────────────────────────────
# ANTHROPIC_AUTH_TOKEN phai khop voi api-keys nay
auth-dir: "~/.cli-proxy-api"
api-keys:
  - "sk-my-secret-key"
# ── Logging ────────────────────────────────────────────────
debug: false
logging-to-file: true # BẬT: lưu log file để dễ debug
logs-max-total-size-mb: 200 # tăng để giữ đủ history
error-logs-max-files: 20
usage-statistics-enabled: true
proxy-url: ""
passthrough-headers: true # BẬT: forward đầy đủ Claude Code headers
nonstream-keepalive-interval: 30 # tránh idle disconnect với tool calls
# ── Retry & Failover ───────────────────────────────────────
request-retry: 3
max-retry-credentials: 0
max-retry-interval: 30
quota-exceeded:
  switch-project: true
  switch-preview-model: true
  antigravity-credits: true
# ── Routing & Session Affinity ─────────────────────────────
# session-affinity = FIX loi "dot token" nhu 9Router
# Giu conversation o cung 1 account, tranh gui lai full context
routing:
  strategy: "round-robin"
  session-affinity: true
  session-affinity-ttl: "12h" # tăng từ 8h: ổn định hơn cho long sessions
streaming:
  keepalive-seconds: 30  # tăng từ 20: ổn định hơn với Opus+thinking dài (>2 phút)
  bootstrap-retries: 3  # giữ nguyên: ổn định khi failover giữa accounts
# ── OAuth Model Aliases ────────────────────────────────────
# Claude Code CLI gui ten model Claude → CLIProxyAPI doi sang Codex
# Real Codex models xac nhan tu /v1/models:
#   gpt-5.4       (manh nhat)
